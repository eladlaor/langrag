# Grafana Configuration for LangRAG Newsletter System
# Visualization frontend for Loki logs and Langfuse traces

[server]
http_port = 3002
root_url = http://localhost:3002
serve_from_sub_path = false

[auth.anonymous]
# Enable anonymous access for development
enabled = true
org_role = Admin

[auth]
# Disable login for development (use auth.anonymous)
disable_login_form = true

[security]
# Admin credentials (change in production)
admin_user = admin
admin_password = ${GRAFANA_ADMIN_PASSWORD:-admin}
allow_embedding = true

[users]
# Allow users to sign up
allow_sign_up = false
default_theme = dark

[dashboards]
# Default home dashboard
default_home_dashboard_path = /etc/grafana/dashboards/newsletter-pipeline.json

[log]
mode = console
level = info

[paths]
# Provisioning paths
provisioning = /etc/grafana/provisioning
