# Promtail Configuration for LangRAG Newsletter System
# Ships logs from application containers to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=langrag"]

    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

    pipeline_stages:
      # Parse JSON logs from loguru
      - json:
          expressions:
            timestamp_utc: timestamp_utc
            level: level
            message: message
            module: module
            function: function
            line: line
            trace_id: trace_id
            run_id: run_id
            node_name: node_name
            environment: environment

      # Use parsed timestamp
      - timestamp:
          source: timestamp_utc
          format: RFC3339Nano

      # Extract log level as label
      - labels:
          level:
          trace_id:
          run_id:
          node_name:
          environment:

      # Set log line from message
      - output:
          source: message
