global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'langrag'
    environment: 'development'

scrape_configs:
  - job_name: 'langrag'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
