# Production-only nginx HTTPS server blocks for langrag.ai + mcp.langrag.ai.
# Copy this into /etc/nginx/conf.d/ inside the app container only after
# Let's Encrypt certs exist on the host. The deploy runbook describes the
# first-time issuance flow.

# ------------------------------------------------------------------
# HTTPS — public langrag.ai (web UI + REST API)
# ------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name langrag.ai www.langrag.ai;

    ssl_certificate /etc/letsencrypt/live/langrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/langrag.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /app/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /output/ {
        alias /app/output/;
        autoindex on;
    }

    # Edge concurrency + burst backstop for the RAG chat routes (per-IP). The
    # rag_conn / rag_req zones are declared in nginx.conf's http{} and are in
    # scope here (this file is included into that http{} via conf.d/*.conf), so
    # they are NOT redeclared. In-app semaphore remains authoritative.
    location ~ ^/api/v1/rag/chat {
        limit_conn rag_conn 20;
        limit_req  zone=rag_req burst=20 nodelay;
        limit_conn_status 503;
        limit_req_status  503;
        add_header Retry-After 5 always;
        proxy_pass http://localhost:8000;
        include /etc/nginx/proxy_rag.conf;
    }

    location /api/ {
        location ~ ^/api/v1/rag/ingest/ {
            if ($rag_ingest_allowed = 0) { return 403; }
            proxy_pass http://localhost:8000;
            include /etc/nginx/proxy_rag.conf;
        }

        proxy_pass http://localhost:8000;
        include /etc/nginx/proxy_rag.conf;
    }

    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://localhost:8000/health;
        proxy_set_header Host $host;
    }
}

# ------------------------------------------------------------------
# HTTPS — mcp.langrag.ai (Model Context Protocol server, SSE)
# ------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name mcp.langrag.ai;

    ssl_certificate /etc/letsencrypt/live/langrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/langrag.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        # Edge concurrency + burst backstop for the MCP surface (per-IP). The
        # dedicated mcp_conn / mcp_req zones live in nginx.conf's http{} (in scope
        # here via the conf.d/*.conf include); not redeclared. They are separate
        # from the REST rag_conn / rag_req zones so MCP traffic and REST traffic
        # do not share a per-IP budget. The in-app semaphore in the MCP process is
        # authoritative — this bounds the per-IP aggregate. The MCP process
        # (:8765) is separate from REST (:8000), so each enforces its own
        # per-process budget; see RAGSettings.max_concurrent_requests.
        limit_conn mcp_conn 20;
        limit_req  zone=mcp_req burst=10 nodelay;
        limit_conn_status 503;
        limit_req_status  503;
        add_header Retry-After 5 always;

        # MCP runs in the separate langrag-mcp container, NOT in this (app)
        # container, so localhost:8765 is unreachable from here. Target the
        # compose service DNS name on the shared langrag-network.
        proxy_pass http://langrag-mcp:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
