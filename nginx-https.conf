# Production-only nginx HTTPS server blocks for langrag.ai + mcp.langrag.ai.
# Copy this into /etc/nginx/conf.d/ inside the app container only after
# Let's Encrypt certs exist on the host. The deploy runbook describes the
# first-time issuance flow.

# ------------------------------------------------------------------
# HTTPS — public langrag.ai (web UI + REST API)
# ------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name langrag.ai www.langrag.ai;

    ssl_certificate /etc/letsencrypt/live/langrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/langrag.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /app/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /output/ {
        alias /app/output/;
        autoindex on;
    }

    location /api/ {
        location ~ ^/api/v1/rag/ingest/ {
            if ($rag_ingest_allowed = 0) { return 403; }
            proxy_pass http://localhost:8000;
            include /etc/nginx/proxy_rag.conf;
        }

        proxy_pass http://localhost:8000;
        include /etc/nginx/proxy_rag.conf;
    }

    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://localhost:8000/health;
        proxy_set_header Host $host;
    }
}

# ------------------------------------------------------------------
# HTTPS — mcp.langrag.ai (Model Context Protocol server, SSE)
# ------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name mcp.langrag.ai;

    ssl_certificate /etc/letsencrypt/live/langrag.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/langrag.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://localhost:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
