events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Internal allowlist for ingestion endpoints (kept off the public internet).
    # Update with the host's loopback / private CIDR after deploy.
    geo $rag_ingest_allowed {
        default 0;
        127.0.0.1 1;
        ::1 1;
        10.0.0.0/8 1;
        172.16.0.0/12 1;
        192.168.0.0/16 1;
    }

    # ------------------------------------------------------------------
    # HTTP server (port 80)
    # Local dev: serves UI + API directly. Production: serves only the
    # ACME challenge and redirects everything else to HTTPS.
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost langrag.ai www.langrag.ai mcp.langrag.ai;

        # Let's Encrypt ACME challenge — must stay on plain HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # In production (DOMAIN env != "localhost"), redirect everything
        # else to HTTPS. The redirect is conditional so localhost dev keeps
        # working without certs.
        if ($host != "localhost") {
            return 301 https://$host$request_uri;
        }

        location /output/ {
            alias /app/output/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            add_header Content-Type text/html;
            types {
                text/html html htm;
                text/css css;
                application/json json;
                text/markdown md;
            }
        }

        location / {
            root /app/frontend/build;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # Block public ingestion endpoints — the langrag.ai surface is
            # read-mostly. Operators should ingest over the loopback or VPN.
            location ~ ^/api/v1/rag/ingest/ {
                if ($rag_ingest_allowed = 0) { return 403; }
                proxy_pass http://localhost:8000;
                include /etc/nginx/proxy_rag.conf;
            }

            proxy_pass http://localhost:8000;
            include /etc/nginx/proxy_rag.conf;
        }

        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://localhost:8000/health;
            proxy_set_header Host $host;
        }
    }

    # HTTPS server blocks live in /etc/nginx/conf.d/*.conf — copied in only
    # for production builds (the certbot deploy hook drops the file in once
    # certs exist). Local dev keeps a HTTP-only nginx that boots cleanly.
    include /etc/nginx/conf.d/*.conf;
}
