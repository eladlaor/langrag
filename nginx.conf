events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Concurrency + burst backstop for the RAG surface. The in-app
    # asyncio.Semaphore (RAG_MAX_CONCURRENT_REQUESTS, default 50) is authoritative;
    # this edge cap sheds excess per-IP before it reaches uvicorn. These zones are
    # declared once here in http{} and are in scope for the HTTPS server blocks
    # included via conf.d/*.conf, so nginx-https.conf must NOT redeclare them.
    limit_conn_zone $binary_remote_addr zone=rag_conn:10m;
    limit_req_zone  $binary_remote_addr zone=rag_req:10m rate=10r/s;

    # Dedicated edge caps for the MCP surface (mcp.langrag.ai, :8765 upstream in
    # the sibling langrag-mcp container). Kept separate from the REST rag_* zones
    # so MCP and REST clients do not share a per-IP budget. The 30r/m rate mirrors
    # RATE_DEFAULT ("30/minute") in src/api/rate_limiting.py — one documented
    # number, not a new unexplained literal. Referenced by the mcp.langrag.ai
    # server block in nginx-https.conf (included via conf.d/*.conf).
    limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;
    limit_req_zone  $binary_remote_addr zone=mcp_req:10m rate=30r/m;

    # Internal allowlist for ingestion endpoints (kept off the public internet).
    # Update with the host's loopback / private CIDR after deploy.
    geo $rag_ingest_allowed {
        default 0;
        127.0.0.1 1;
        ::1 1;
        10.0.0.0/8 1;
        172.16.0.0/12 1;
        192.168.0.0/16 1;
    }

    # ------------------------------------------------------------------
    # HTTP server (port 80)
    # Local dev: serves UI + API directly. Production: serves only the
    # ACME challenge and redirects everything else to HTTPS.
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost langrag.ai www.langrag.ai mcp.langrag.ai;

        # Let's Encrypt ACME challenge — must stay on plain HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS ONLY for genuinely-insecure requests. Cloudflare
        # terminates TLS at the edge and re-fetches this origin over plain HTTP
        # (Flexible SSL mode), setting X-Forwarded-Proto=https on that hop. The
        # old `if ($host != "localhost")` form redirected EVERY proxied request
        # back to https, which CF re-served over http to the origin -> infinite
        # redirect loop (ERR_TOO_MANY_REDIRECTS). Gating on the forwarded proto
        # only redirects real http clients, never CF already-https traffic, and
        # localhost dev (no header) is unaffected.
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        location /output/ {
            alias /app/output/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            add_header Content-Type text/html;
            types {
                text/html html htm;
                text/css css;
                application/json json;
                text/markdown md;
            }
        }

        # Content-hashed build assets (CRA emits a new filename per build),
        # so they are safe to cache forever. New deploy = new filename.
        location /static/ {
            root /app/frontend/build;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            root /app/frontend/build;
            index index.html;
            try_files $uri $uri/ /index.html;
            # The SPA entrypoint must never be cached (edge or browser), or a
            # deploy that changes the bundle hash keeps serving stale HTML that
            # points at an old, purged bundle. Hashed /static/* stays cached above.
            add_header Cache-Control "no-store, must-revalidate";
        }

        # Edge concurrency + burst backstop for the expensive RAG chat routes.
        # Placed BEFORE the generic location /api/ so nginx's most-specific-regex
        # match selects it for /api/v1/rag/chat[/stream]. Per-IP guards, looser
        # than the in-app global cap; the semaphore is the authoritative limit.
        location ~ ^/api/v1/rag/chat {
            limit_conn rag_conn 20;
            limit_req  zone=rag_req burst=20 nodelay;
            limit_conn_status 503;
            limit_req_status  503;
            add_header Retry-After 5 always;
            proxy_pass http://localhost:8000;
            include /etc/nginx/proxy_rag.conf;
        }

        location /api/ {
            # Block public ingestion endpoints — the langrag.ai surface is
            # read-mostly. Operators should ingest over the loopback or VPN.
            location ~ ^/api/v1/rag/ingest/ {
                if ($rag_ingest_allowed = 0) { return 403; }
                proxy_pass http://localhost:8000;
                include /etc/nginx/proxy_rag.conf;
            }

            proxy_pass http://localhost:8000;
            include /etc/nginx/proxy_rag.conf;
        }

        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://localhost:8000/health;
            proxy_set_header Host $host;
        }
    }

    # HTTPS server blocks live in /etc/nginx/conf.d/*.conf — copied in only
    # for production builds (the certbot deploy hook drops the file in once
    # certs exist). Local dev keeps a HTTP-only nginx that boots cleanly.
    include /etc/nginx/conf.d/*.conf;
}
