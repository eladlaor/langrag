events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # HTTP Server (Port 80)
    # Works for both local dev (localhost) and production (langrag.ai)
    server {
        listen 80;
        server_name localhost langrag.ai www.langrag.ai;

        # Let's Encrypt ACME challenge (for future SSL setup in production)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Serve output files (newsletters, reports, etc.)
        # IMPORTANT: This must come BEFORE the / location
        location /output/ {
            alias /app/output/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            add_header Content-Type text/html;
            types {
                text/html html htm;
                text/css css;
                application/json json;
                text/markdown md;
            }
        }

        # Serve React frontend static files (catch-all, must be last)
        location / {
            root /app/frontend/build;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            proxy_pass http://localhost:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Increase timeouts for long-running newsletter generation (5 hours)
            proxy_read_timeout 18000s;
            proxy_connect_timeout 18000s;
            proxy_send_timeout 18000s;
            client_body_timeout 18000s;
        }

        # Proxy /docs and /redoc to backend
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://localhost:8000/health;
            proxy_set_header Host $host;
        }
    }

    # HTTPS Server (Port 443) - SSL enabled
    # Uncomment this block after running certbot to obtain SSL certificates
    # server {
    #     listen 443 ssl http2;
    #     server_name langrag.ai www.langrag.ai;
