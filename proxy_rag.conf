# Shared proxy params for the FastAPI backend.
# Mounted into nginx as /etc/nginx/proxy_rag.conf via docker-compose.

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# SSE streaming support (RAG /chat/stream + newsletter SSE)
proxy_buffering off;
proxy_cache off;
proxy_http_version 1.1;
chunked_transfer_encoding on;

# Long timeouts for newsletter generation (5 hours)
proxy_read_timeout 18000s;
proxy_connect_timeout 18000s;
proxy_send_timeout 18000s;
client_body_timeout 18000s;
